name: CI/CD — Raaya Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to the graduation demo EC2 instance'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: raaya-backend

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test
        env:
          NODE_ENV: test

      - name: Run auth e2e tests
        run: npm run test:e2e -- --runInBand
        env:
          NODE_ENV: test

  # ── Job 2: Build & Deploy (manual only) ─────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Keep only recent ECR images
        run: |
          old_images=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --query 'reverse(sort_by(imageDetails[?imageTags && !contains(imageTags, `latest`)], &imagePushedAt))[2:].imageDigest' \
            --output text)

          if [ -n "$old_images" ]; then
            for digest in $old_images; do
              aws ecr batch-delete-image \
                --repository-name "$ECR_REPOSITORY" \
                --image-ids imageDigest="$digest"
            done
          fi

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ECR login (بيستخدم الـ EC2 IAM role)
            aws ecr get-login-password --region us-east-1 \
              | docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull latest image
            docker pull ${{ secrets.ECR_REGISTRY }}/raaya-backend:latest

            # Stop old container
            docker stop raaya-api 2>/dev/null || true
            docker rm   raaya-api 2>/dev/null || true

            # Run new container مع CloudWatch logging
            docker run -d \
              --name raaya-api \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /home/ec2-user/.env \
              --log-driver awslogs \
              --log-opt awslogs-region=us-east-1 \
              --log-opt awslogs-group=/raaya/backend \
              --log-opt awslogs-create-group=true \
              ${{ secrets.ECR_REGISTRY }}/raaya-backend:latest

            # Health check بعد الـ deploy
            sleep 5
            curl -f http://localhost:3000/health \
              && echo "✅ Deploy OK" \
              || (echo "❌ Health check failed" && exit 1)
