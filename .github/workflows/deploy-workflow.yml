name: CI/CD — Raaya Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to the graduation demo EC2 instance'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: raaya-backend

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test
        env:
          NODE_ENV: test

      - name: Run auth e2e tests
        run: npm run test:e2e -- --runInBand
        env:
          NODE_ENV: test

  # ── Job 2: Build & Deploy (manual only) ─────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Keep only recent ECR images
        run: |
          old_images=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --query 'reverse(sort_by(imageDetails[?imageTags && !contains(imageTags, `latest`)], &imagePushedAt))[2:].imageDigest' \
            --output text)

          if [ -n "$old_images" ]; then
            for digest in $old_images; do
              aws ecr batch-delete-image \
                --repository-name "$ECR_REPOSITORY" \
                --image-ids imageDigest="$digest"
            done
          fi

      - name: Copy Nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'nginx/raaya-api.conf'
          target: '/home/ec2-user/raaya-backend/'
          strip_components: 1

      - name: Copy migrations to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'migrations/'
          target: '/home/ec2-user/raaya-backend/'
          strip_components: 0

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ECR login (بيستخدم الـ EC2 IAM role)
            aws ecr get-login-password --region us-east-1 \
              | docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull latest image
            docker pull ${{ secrets.ECR_REGISTRY }}/raaya-backend:latest

            # Stop old container
            docker stop raaya-api 2>/dev/null || true
            docker rm   raaya-api 2>/dev/null || true

            # Run new container مع CloudWatch logging
            # The -e flags below override the same keys if also present in
            # /home/ec2-user/.env; this is intentional so the workflow stays
            # the source of truth for non-secret config like public URLs.
            docker run -d \
              --name raaya-api \
              --restart unless-stopped \
              -p 127.0.0.1:3000:3000 \
              --env-file /home/ec2-user/.env \
              -e DB_NAME=raaya \
              -e DB_USER=raaya_admin \
              -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              -e S3_MEDIA_PUBLIC_BASE_URL=https://raaya-demo-media.s3.amazonaws.com \
              -e VOLUNTEER_PUBLIC_BASE_URL=https://api.helpers-tech.com/v \
              -e VOLUNTEER_PUBLIC_LINK_TTL_DAYS=30 \
              -e "AZURE_SPEECH_KEY=${{ secrets.AZURE_SPEECH_KEY }}" \
              -e "AZURE_SPEECH_REGION=${{ secrets.AZURE_SPEECH_REGION }}" \
              --log-driver awslogs \
              --log-opt awslogs-region=us-east-1 \
              --log-opt awslogs-group=/raaya/backend \
              --log-opt awslogs-create-group=true \
              ${{ secrets.ECR_REGISTRY }}/raaya-backend:latest

            # Health check داخلي (بعيداً عن Nginx)
            sleep 5
            curl -f http://127.0.0.1:3000/health \
              && echo "✅ Container OK" \
              || (echo "❌ Container health check failed" && exit 1)

            # تحديث Nginx config وإعادة التحميل
            if [ -f /home/ec2-user/raaya-backend/raaya-api.conf ]; then
              sudo cp /home/ec2-user/raaya-backend/raaya-api.conf \
                      /etc/nginx/sites-available/raaya-api
              sudo nginx -t \
                && sudo systemctl reload nginx \
                && echo "✅ Nginx reloaded" \
                || echo "⚠️ Nginx reload failed — راجع الـ config"
            fi

            # تشغيل Migrations
            # NOTE: docker exec needs -i so the SQL file content actually
            # streams into the container's psql stdin. Without -i, psql sees
            # an empty stdin, exits 0, and silently skips the migration.
            for f in /home/ec2-user/raaya-backend/migrations/*.sql; do
              echo "▶ Running migration: $(basename $f)"
              docker exec -i raaya-api sh -c \
                "PGPASSWORD=\$DB_PASSWORD psql -h \$DB_HOST -U \$DB_USER -d \$DB_NAME -v ON_ERROR_STOP=1 -f -" \
                < "$f" \
                && echo "✅ $(basename $f)" \
                || echo "⚠️ $(basename $f) failed (may already exist)"
            done

            # Health check عبر HTTPS
            sleep 2
            curl -sf https://api.helpers-tech.com/health \
              && echo "✅ HTTPS OK" \
              || echo "⚠️ HTTPS check failed — Nginx أو الشهادة تحتاج مراجعة"
