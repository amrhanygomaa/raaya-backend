# Nginx reverse proxy for Raaya Backend
# Domain: api.helpers-tech.com → localhost:3000 (Docker container)
#
# ⚠️ هذا الملف يُنسَخ تلقائياً إلى EC2 عبر GitHub Actions على كل deploy
# الشهادة تُجدَّد تلقائياً بـ Certbot cron

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.helpers-tech.com;

    # Let's Encrypt challenge (لازم يبقى HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS → NestJS ────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.helpers-tech.com;

    # Certbot يملأ هذين السطرين تلقائياً بعد certbot --nginx
    ssl_certificate     /etc/letsencrypt/live/api.helpers-tech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.helpers-tech.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ── Proxy إلى Docker container ─────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (للـ real-time لاحقاً)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # رفع حد حجم الـ body لـ S3 uploads
        client_max_body_size 50M;
    }
}
